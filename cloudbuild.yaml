steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pageyoink:$COMMIT_SHA', '.']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pageyoink:$COMMIT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pageyoink'
      - '--image'
      - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pageyoink:$COMMIT_SHA'
      - '--region'
      - 'us-east1'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '60'
      - '--max-instances'
      - '5'
      - '--min-instances'
      - '0'
      - '--port'
      - '3000'

images:
  - 'us-east1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/pageyoink:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
